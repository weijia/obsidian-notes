name: "Publish to WebDAV"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup yarn
        uses: borales/actions-yarn@v5

      - name: Get yarn cache directory
        shell: bash
        run: echo "YARN_CACHE_DIR=$(yarn cache dir)" >> $GITHUB_ENV

      - name: Setup yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ env.YARN_CACHE_DIR }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install

      - name: Build the project
        run: yarn build

      - name: Upload to WebDAV
        uses: weijia/action-upload-webdav@master
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/obsidian
          source-directory: ./dist

#
# !/bin/bash

# 登录 GitHub CLI
# gh auth login

# 设置 WebDAV 相关 Secrets
# gh secret set WEBDAV_URL --repo username/obsidian-notes --body "https://your-webdav-server.com"
# gh secret set WEBDAV_USERNAME --repo username/obsidian-notes --body "your-username"
# gh secret set WEBDAV_PASSWORD --repo username/obsidian-notes --body "your-password"